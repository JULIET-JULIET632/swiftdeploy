networks:
  swiftdeploy-net:
    driver: bridge

volumes:
  swiftdeploy-logs:

services:

  app:
    image: swift-deploy-1-node:latest
    container_name: swiftdeploy-app
    restart: unless-stopped
    networks:
      - swiftdeploy-net
    volumes:
      - swiftdeploy-logs:/var/log/app
    environment:
      MODE:        "stable"
      APP_VERSION: "1.0.0"
      APP_PORT:    "3000"
    expose:
      - "3000"
    cap_drop:
      - ALL
    cap_add:
      - NET_BIND_SERVICE
    security_opt:
      - no-new-privileges:true
    user: "1000:1000"
    healthcheck:
      test: ["CMD", "python3", "-c",
             "import urllib.request; urllib.request.urlopen('http://localhost:3000/healthz')"]
      interval: 10s
      timeout:  5s
      retries:  3
      start_period: 5s

  nginx:
    image: nginx:latest
    container_name: swiftdeploy-nginx
    restart: unless-stopped
    networks:
      - swiftdeploy-net
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./log_format.conf:/etc/nginx/conf.d/00_log_format.conf:ro
      - swiftdeploy-logs:/var/log/nginx
    ports:
      - "8080:8080"
    depends_on:
      app:
        condition: service_healthy
